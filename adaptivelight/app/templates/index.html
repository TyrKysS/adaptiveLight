<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdaptiveLight Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d1117;
      --bg-card:    #161b22;
      --bg-inset:   #0d1117;
      --border:     rgba(255,255,255,0.07);
      --accent:     #f59e0b;
      --blue:       #3b82f6;
      --green:      #22c55e;
      --red:        #ef4444;
      --purple:     #a855f7;
      --text:       #e2e8f0;
      --text-muted: #64748b;
      --text-dim:   #94a3b8;
      --r:          12px;
      --r-sm:       8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      padding: 18px 16px 48px;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── header ── */
    .header {
      display: flex; align-items: flex-start; justify-content: space-between;
      flex-wrap: wrap; gap: 10px;
      margin-bottom: 18px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .header h1 { font-size: 1.3rem; font-weight: 700; color: var(--accent); letter-spacing: -.3px; }
    .header-sub { font-size: .72rem; color: var(--text-muted); margin-top: 3px; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .btn {
      background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
      padding: 6px 13px; border-radius: var(--r-sm); cursor: pointer; font-size: .8rem;
      font-weight: 500; transition: background .15s; display: flex; align-items: center; gap: 5px;
    }
    .btn:hover { background: #1e2430; }
    .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
    .btn-primary:hover { background: #d97706; }
    .countdown { font-size: .7rem; color: var(--text-muted); }

    /* ── tabs ── */
    .tabs {
      display: flex; gap: 4px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }
    .tab-btn {
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--text-muted); padding: 8px 16px; cursor: pointer;
      font-size: .85rem; font-weight: 500; transition: color .15s, border-color .15s;
      margin-bottom: -1px;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn:hover:not(.active) { color: var(--text); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── stats bar ── */
    .stats-bar {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px; margin-bottom: 18px;
    }
    .stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 16px; text-align: center; }
    .stat-num { font-size: 1.8rem; font-weight: 700; color: var(--accent); line-height: 1; }
    .stat-lbl { margin-top: 4px; font-size: .68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }

    /* ── automation status card ── */
    .auto-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r);
      padding: 16px 20px; margin-bottom: 18px;
      display: flex; align-items: flex-start; gap: 16px; flex-wrap: wrap;
    }
    .auto-card.enabled { border-color: rgba(168,85,247,.3); }
    .auto-icon { font-size: 1.6rem; flex-shrink: 0; margin-top: 2px; }
    .auto-body { flex: 1; min-width: 180px; }
    .auto-title { font-weight: 600; font-size: .9rem; margin-bottom: 6px; }
    .auto-rule { font-size: .82rem; color: var(--text-dim); margin-bottom: 8px; }
    .auto-meta { display: flex; gap: 14px; flex-wrap: wrap; }
    .auto-chip {
      background: var(--bg-inset); border-radius: 6px; padding: 4px 10px;
      font-size: .72rem; color: var(--text-dim); display: flex; align-items: center; gap: 5px;
    }
    .auto-chip.action-on  { color: var(--green); }
    .auto-chip.action-off { color: var(--blue); }
    .auto-actions { display: flex; gap: 8px; align-items: flex-start; flex-shrink: 0; margin-top: 2px; }

    /* ── sun card ── */
    .sun-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r);
      padding: 20px; margin-bottom: 18px;
      display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
    }
    canvas#sunCompass { width: 150px; height: 150px; flex-shrink: 0; border-radius: 50%; }
    .sun-meta { flex: 1; min-width: 220px; }
    .sun-status { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: .82rem; color: var(--text-dim); }
    .sun-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
    .sun-metric { background: var(--bg-inset); border-radius: var(--r-sm); padding: 9px 13px; }
    .sun-metric-lbl { font-size: .65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
    .sun-metric-val { font-size: 1.2rem; font-weight: 700; }
    .val-el { color: #f97316; } .val-az { color: var(--blue); } .val-t { font-size: .95rem; color: var(--text-dim); }

    /* ── section ── */
    .section { margin-bottom: 18px; }
    .section-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
    .section-title { font-size: .9rem; font-weight: 600; }
    .badge { background: rgba(255,255,255,.08); border-radius: 999px; padding: 1px 8px; font-size: .68rem; color: var(--text-muted); }

    /* ── entity grid ── */
    .entity-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 8px; }
    .entity {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 10px 14px; display: flex; align-items: center; gap: 10px; transition: background .12s;
    }
    .entity:hover { background: #1b2130; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .dot-on  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot-off { background: #374151; }
    .dot-na  { background: var(--red); }
    .dot-lux { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .entity-info { flex: 1; min-width: 0; }
    .entity-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entity-eid  { font-size: .67rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .bar-wrap { margin-top: 5px; height: 3px; background: rgba(255,255,255,.06); border-radius: 2px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 2px; transition: width .3s; }
    .bar-l { background: var(--accent); } .bar-lx { background: var(--accent); }
    .entity-val { font-size: .8rem; font-weight: 600; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
    .entity-val.on  { color: var(--green); }
    .entity-val.lux { color: var(--accent); }

    /* ── settings tab ── */
    .settings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
    .settings-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); padding: 18px;
    }
    .settings-card-title { font-weight: 600; font-size: .9rem; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

    /* toggle */
    .toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .toggle-label { font-size: .85rem; }
    .toggle-desc { font-size: .72rem; color: var(--text-muted); margin-top: 2px; }
    .switch { position: relative; display: inline-block; width: 42px; height: 24px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; inset: 0;
      background: #374151; border-radius: 24px; transition: background .2s;
    }
    .slider::before {
      content: ""; position: absolute; width: 18px; height: 18px;
      left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: transform .2s;
    }
    input:checked + .slider { background: var(--accent); }
    input:checked + .slider::before { transform: translateX(18px); }

    /* lux slider */
    .lux-control { margin-top: 4px; }
    .lux-value-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .lux-number {
      background: var(--bg-inset); border: 1px solid var(--border); color: var(--text);
      border-radius: var(--r-sm); padding: 7px 12px; font-size: 1rem; font-weight: 700;
      width: 100px; text-align: center;
    }
    .lux-number:focus { outline: none; border-color: var(--accent); }
    .lux-unit { font-size: .75rem; color: var(--text-muted); }
    input[type=range] {
      width: 100%; accent-color: var(--accent); cursor: pointer; height: 6px;
    }
    .lux-hint { font-size: .72rem; color: var(--text-muted); margin-top: 8px; }

    /* entity checklist */
    .checklist { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; padding-right: 4px; }
    .checklist::-webkit-scrollbar { width: 4px; }
    .checklist::-webkit-scrollbar-track { background: transparent; }
    .checklist::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }
    .check-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: var(--r-sm);
      cursor: pointer; transition: background .1s; user-select: none;
    }
    .check-item:hover { background: rgba(255,255,255,.04); }
    .check-item input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; flex-shrink: 0; cursor: pointer; }
    .check-info { flex: 1; min-width: 0; }
    .check-name { font-size: .84rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .check-eid  { font-size: .67rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .check-val  { font-size: .78rem; font-weight: 600; color: var(--text-muted); flex-shrink: 0; white-space: nowrap; }
    .check-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .empty-check { font-size: .8rem; color: var(--text-muted); padding: 16px 0; text-align: center; }

    /* save bar */
    .save-bar {
      position: sticky; bottom: 0;
      background: rgba(13,17,23,.95); backdrop-filter: blur(8px);
      border-top: 1px solid var(--border);
      padding: 12px 0; margin-top: 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .save-hint { font-size: .75rem; color: var(--text-muted); }
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      background: var(--green); color: #000; font-weight: 600; font-size: .85rem;
      padding: 10px 18px; border-radius: var(--r-sm); box-shadow: 0 4px 20px rgba(0,0,0,.4);
      transform: translateY(60px); opacity: 0; transition: all .25s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.err { background: var(--red); color: #fff; }

    /* misc */
    .empty { text-align: center; padding: 24px; color: var(--text-muted); font-size: .8rem; background: var(--bg-card); border-radius: var(--r-sm); border: 1px dashed var(--border); }
    .error-box { background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.25); border-radius: var(--r); padding: 16px; color: #fca5a5; text-align: center; }
    .loading { text-align: center; padding: 60px; color: var(--text-muted); font-size: .9rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin .8s linear infinite; }

    @media (max-width: 520px) {
      .sun-card { flex-direction: column; align-items: stretch; }
      canvas#sunCompass { margin: 0 auto; }
      .settings-grid { grid-template-columns: 1fr; }
    }

    /* ── RL status card ── */
    .rl-card {
      background: var(--bg-card); border: 1px solid rgba(59,130,246,.25); border-radius: var(--r);
      padding: 16px 20px; margin-bottom: 18px;
      display: flex; align-items: flex-start; gap: 16px; flex-wrap: wrap;
    }
    .rl-stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px;
      margin-top: 4px;
    }
    .rl-stat { background: var(--bg-inset); border-radius: var(--r-sm); padding: 9px 12px; }
    .rl-stat-lbl { font-size: .62rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
    .rl-stat-val { font-size: 1.1rem; font-weight: 700; }
    .btn-danger { color: var(--red); border-color: rgba(239,68,68,.35); }
    .btn-danger:hover { background: rgba(239,68,68,.08); }
  </style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────── -->
<div class="header">
  <div>
    <h1>☀️ AdaptiveLight Monitor</h1>
    <div class="header-sub" id="lastUpdated">Inicializuji…</div>
  </div>
  <div class="header-right">
    <span class="countdown" id="countdown"></span>
    <button class="btn" onclick="refreshOverview()"><span id="refreshIcon">↻</span> Obnovit</button>
  </div>
</div>

<!-- ── TABS ──────────────────────────────────────────────── -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('overview', this)">📊 Přehled</button>
  <button class="tab-btn" onclick="switchTab('settings', this)">⚙️ Nastavení</button>
  <button class="tab-btn" onclick="switchTab('rl', this)">🧠 RL Regulace</button>
</div>

<!-- ════════════════════════════════════════════════════════ -->
<!--  TAB: PŘEHLED                                          -->
<!-- ════════════════════════════════════════════════════════ -->
<div id="tab-overview" class="tab-pane active">
  <div id="overviewRoot"><div class="loading">⏳ Načítám entity z Home Assistant…</div></div>
</div>

<!-- ════════════════════════════════════════════════════════ -->
<!--  TAB: NASTAVENÍ                                        -->
<!-- ════════════════════════════════════════════════════════ -->
<div id="tab-settings" class="tab-pane">
  <div id="settingsRoot"><div class="loading">⏳ Načítám nastavení…</div></div>
</div>

<!-- ════════════════════════════════════════════════════════ -->
<!--  TAB: RL REGULACE                                      -->
<!-- ════════════════════════════════════════════════════════ -->
<div id="tab-rl" class="tab-pane">
  <div id="rlRoot"><div class="loading">⏳ Načítám…</div></div>
</div>

<!-- toast -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let _entities = null;   // last fetched entities
let _cfg = null;        // current config (working copy in settings)
let _savedCfg = null;   // last saved config (for dirty detection)
let _rlStatus = null;   // last fetched RL status

/* ═══════════════════════════════════════════
   TABS
═══════════════════════════════════════════ */
function switchTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'settings') loadSettings();
  if (name === 'rl') loadRL();
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
const fmt = {
  state(s) {
    return {on:'ZAP',off:'VYP',unavailable:'N/A',unknown:'???',
            above_horizon:'Nad horizontem',below_horizon:'Pod horizontem'}[s] ?? s;
  },
  time(iso) {
    if (!iso) return '—';
    try { return new Date(iso).toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'}); }
    catch { return iso; }
  },
  num(v, dec=1) { const n=parseFloat(v); return isNaN(n)?v:n.toLocaleString('cs-CZ',{maximumFractionDigits:dec}); }
};

function dotCls(state) {
  if (state==='on'||state==='above_horizon') return 'dot-on';
  if (state==='unavailable') return 'dot-na';
  return 'dot-off';
}

function showToast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  setTimeout(() => { t.className='toast'; }, 2800);
}

/* ═══════════════════════════════════════════
   SUN COMPASS
═══════════════════════════════════════════ */
function drawCompass(az, elev) {
  const c = document.getElementById('sunCompass');
  if (!c) return;
  const ctx = c.getContext('2d'), W=c.width, cx=W/2, cy=W/2, R=cx-4;
  ctx.clearRect(0,0,W,W);

  // bg
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.fillStyle='#0d1117'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.1)'; ctx.lineWidth=1; ctx.stroke();

  // rings
  [.66,.33].forEach(f=>{
    ctx.beginPath(); ctx.arc(cx,cy,R*f,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,.05)'; ctx.lineWidth=1; ctx.stroke();
  });

  // cardinals
  ctx.font='bold 10px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  [['S',0],['V',90],['J',180],['Z',270]].forEach(([l,d])=>{
    const a=(d-90)*Math.PI/180;
    ctx.fillStyle=d===0||d===180?'rgba(255,255,255,.5)':'rgba(255,255,255,.28)';
    ctx.fillText(l, cx+(R-11)*Math.cos(a), cy+(R-11)*Math.sin(a));
  });

  if (az==null) return;
  const elR=Math.min(1,Math.max(0,(Number(elev)+18)/108));
  const dist=R*(1-elR*.8);
  const azR=(Number(az)-90)*Math.PI/180;
  const sx=cx+dist*Math.cos(azR), sy=cy+dist*Math.sin(azR);

  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(sx,sy);
  ctx.strokeStyle='rgba(251,191,36,.18)'; ctx.lineWidth=1; ctx.stroke();

  const g=ctx.createRadialGradient(sx,sy,0,sx,sy,16);
  g.addColorStop(0,'rgba(251,191,36,.7)'); g.addColorStop(1,'rgba(251,191,36,0)');
  ctx.beginPath(); ctx.arc(sx,sy,16,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  ctx.beginPath(); ctx.arc(sx,sy,6,0,Math.PI*2); ctx.fillStyle='#fbbf24'; ctx.fill();
}

/* ═══════════════════════════════════════════
   OVERVIEW RENDERERS
═══════════════════════════════════════════ */
function renderAutoCard(status, cfg) {
  const enabled   = cfg?.automation_enabled;
  const threshold = cfg?.lux_threshold ?? 50;
  const lights    = cfg?.selected_lights ?? [];
  const sensors   = cfg?.selected_lux_sensors ?? [];
  const autoOff   = cfg?.auto_turn_off ?? false;
  const wsOk      = status?.ws_connected ?? false;

  let rule = '—';
  if (sensors.length && lights.length) {
    rule = `Lux < ${threshold} lx → zapnout ${lights.length} světl${lights.length===1?'o':'a'}` +
           (autoOff ? ` • Lux ≥ ${threshold} lx → zhasnout` : '');
  } else {
    rule = 'Vyberte entity v záložce ⚙️ Nastavení';
  }

  const actionCls   = status?.action==='turn_on' ? 'action-on' : status?.action==='turn_off' ? 'action-off' : '';
  const actionLabel = {turn_on:'✔ Rozsvíceno', turn_off:'✔ Zhasnuto'}[status?.action] ?? '—';
  const luxLabel    = status?.lux != null ? `${status.lux} lx` : '—';
  const triggerTxt  = status?.trigger ? `spustil: ${status.trigger}` : '';

  const wsChip = wsOk
    ? `<div class="auto-chip" style="color:var(--green)">⚡ WebSocket připojen (real-time)</div>`
    : `<div class="auto-chip" style="color:var(--red)">⚠ WebSocket odpojen${status?.error ? ': '+status.error : ''}</div>`;

  return `
    <div class="auto-card ${enabled?'enabled':''}">
      <div class="auto-icon">${enabled ? (wsOk?'⚡':'🔄') : '💤'}</div>
      <div class="auto-body">
        <div class="auto-title">
          Automatizace
          <span style="font-size:.75rem;font-weight:400;color:${enabled?'#a855f7':'var(--text-muted)'}">
            ● ${enabled?'Aktivní':'Vypnuto'}
          </span>
        </div>
        <div class="auto-rule">${rule}</div>
        <div class="auto-meta">
          ${wsChip}
          <div class="auto-chip ${actionCls}">Poslední akce: ${actionLabel}</div>
          <div class="auto-chip">Lux při akci: ${luxLabel}</div>
          ${triggerTxt ? `<div class="auto-chip" style="color:var(--text-muted);font-size:.65rem">${triggerTxt}</div>` : ''}
        </div>
      </div>
      <div class="auto-actions">
        <button class="btn" onclick="triggerAuto()" title="Okamžité vyhodnocení pravidla přes REST">▶ Spustit</button>
      </div>
    </div>`;
}

function renderSun(sun) {
  if (!sun) return '<div class="error-box">Entita <code>sun.sun</code> nebyla nalezena.</div>';
  const isUp = sun.state === 'above_horizon';
  return `
    <div class="sun-card">
      <canvas id="sunCompass" width="150" height="150"></canvas>
      <div class="sun-meta">
        <div class="sun-status">
          <span class="dot ${isUp?'dot-on':'dot-off'}"></span>
          <span>${fmt.state(sun.state)}</span>
          <span style="color:var(--text-muted)"> • ${sun.rising?'↑ Vychází':'↓ Zapadá'}</span>
        </div>
        <div class="sun-grid">
          <div class="sun-metric"><div class="sun-metric-lbl">Elevace</div><div class="sun-metric-val val-el">${sun.elevation!=null?Number(sun.elevation).toFixed(1)+'°':'—'}</div></div>
          <div class="sun-metric"><div class="sun-metric-lbl">Azimut</div><div class="sun-metric-val val-az">${sun.azimuth!=null?Number(sun.azimuth).toFixed(1)+'°':'—'}</div></div>
          <div class="sun-metric"><div class="sun-metric-lbl">Východ</div><div class="sun-metric-val val-t">${fmt.time(sun.next_rising)}</div></div>
          <div class="sun-metric"><div class="sun-metric-lbl">Západ</div><div class="sun-metric-val val-t">${fmt.time(sun.next_setting)}</div></div>
          <div class="sun-metric"><div class="sun-metric-lbl">Sol. poledne</div><div class="sun-metric-val val-t">${fmt.time(sun.next_noon)}</div></div>
          <div class="sun-metric"><div class="sun-metric-lbl">Svítání</div><div class="sun-metric-val val-t">${fmt.time(sun.next_dawn)}</div></div>
        </div>
      </div>
    </div>`;
}

function renderLights(lights) {
  if (!lights.length) return '<div class="empty">Žádná světelná entita nenalezena</div>';
  return lights.map(l => {
    const isOn=l.state==='on', rgb=l.rgb_color?`rgb(${l.rgb_color.join(',')})`:'';
    const dotStyle=isOn&&rgb?`style="background:${rgb};box-shadow:0 0 6px ${rgb}"`:''
    const bar=isOn&&l.brightness_pct!=null?`<div class="bar-wrap"><div class="bar-fill bar-l" style="width:${l.brightness_pct}%"></div></div>`:'';
    const val=isOn?(l.brightness_pct!=null?l.brightness_pct+'%':'ZAP'):fmt.state(l.state);
    return `<div class="entity"><span class="dot ${dotCls(l.state)}" ${dotStyle}></span><div class="entity-info"><div class="entity-name">${l.friendly_name}</div><div class="entity-eid">${l.entity_id}</div>${bar}</div><div class="entity-val ${isOn?'on':''}">${val}</div></div>`;
  }).join('');
}

function renderMotion(sensors) {
  if (!sensors.length) return '<div class="empty">Žádná pohybová čidla nenalezena</div>';
  return sensors.map(s => {
    const isOn=s.state==='on';
    return `<div class="entity"><span class="dot ${dotCls(s.state)}"></span><div class="entity-info"><div class="entity-name">${s.friendly_name}</div><div class="entity-eid">${s.entity_id}</div></div><div class="entity-val ${isOn?'on':''}">${isOn?'● POHYB':'KLID'}</div></div>`;
  }).join('');
}

function renderLux(sensors) {
  if (!sensors.length) return '<div class="empty">Žádné lux senzory nenalezeny</div>';
  const vals=sensors.map(s=>parseFloat(s.state)).filter(v=>!isNaN(v));
  const maxV=vals.length?Math.max(...vals):1;
  return sensors.map(s => {
    const v=parseFloat(s.state), ok=!isNaN(v), pct=ok&&maxV>0?(v/maxV)*100:0;
    return `<div class="entity"><span class="dot ${ok?'dot-lux':'dot-off'}"></span><div class="entity-info"><div class="entity-name">${s.friendly_name}</div><div class="entity-eid">${s.entity_id}</div>${ok?`<div class="bar-wrap"><div class="bar-fill bar-lx" style="width:${pct}%"></div></div>`:''}</div><div class="entity-val ${ok?'lux':''}">${ok?fmt.num(v)+' '+s.unit:s.state}</div></div>`;
  }).join('');
}

/* ═══════════════════════════════════════════
   RL OVERVIEW CARD
═══════════════════════════════════════════ */
function renderRLCard(rl) {
  if (!rl || !rl.enabled) return '';
  const target = rl.target_lux ?? '—';
  const br     = rl.current_brightness != null ? rl.current_brightness.toFixed(0) + ' %' : '—';
  const steps  = rl.train_steps ?? 0;
  const eps    = rl.epsilon != null ? (rl.epsilon * 100).toFixed(0) + ' %' : '—';
  const mem    = rl.memory_size ?? 0;
  const delta  = rl.last_delta != null
    ? (rl.last_delta > 0 ? '+' : '') + rl.last_delta + ' %'
    : '—';
  const reward = rl.last_reward != null ? rl.last_reward.toFixed(2) : '—';
  const dCls   = rl.last_delta > 0 ? 'action-on' : rl.last_delta < 0 ? 'action-off' : '';
  const rStyle = rl.last_reward > 0 ? 'color:var(--green)' : rl.last_reward < 0 ? 'color:var(--red)' : '';

  return `
    <div class="rl-card">
      <div class="auto-icon">🧠</div>
      <div class="auto-body">
        <div class="auto-title">
          RL Regulace světla
          <span style="font-size:.75rem;font-weight:400;color:#3b82f6"> ● Aktivní</span>
        </div>
        <div class="auto-rule">Cíl: <b>${target} lx</b> · Aktuální jas: <b>${br}</b></div>
        <div class="auto-meta">
          <div class="auto-chip">📈 Kroky: ${steps}</div>
          <div class="auto-chip" style="color:var(--purple)">🎲 Průzkum: ${eps}</div>
          <div class="auto-chip">💾 Paměť: ${mem} / 4000</div>
          <div class="auto-chip ${dCls}">Δ jas: ${delta}</div>
          <div class="auto-chip" style="${rStyle}">Odměna: ${reward}</div>
        </div>
      </div>
    </div>`;
}

function renderChecklist(items, selected, group, valFn) {
  if (!items.length) return `<div class="empty-check">Žádné entity tohoto typu nenalezeny</div>`;
  return items.map(item => {
    const eid = item.entity_id;
    const isOn = item.state==='on';
    const dotC = item.state==='on'?'dot-on':item.state==='unavailable'?'dot-na':'dot-off';
    const chk = selected.includes(eid) ? 'checked' : '';
    const val = valFn ? valFn(item) : '';
    return `
      <label class="check-item">
        <input type="checkbox" ${chk} onchange="toggleEntity('${group}','${eid}',this.checked)">
        <span class="check-dot ${dotC}"></span>
        <span class="check-info">
          <span class="check-name">${item.friendly_name}</span>
          <span class="check-eid">${eid}</span>
        </span>
        ${val ? `<span class="check-val">${val}</span>` : ''}
      </label>`;
  }).join('');
}

function cfgSet(key, val) {
  _cfg[key] = val;
}

function toggleEntity(group, eid, checked) {
  const keyMap = {
    lights:'selected_lights', lux:'selected_lux_sensors', motion:'selected_motion_sensors',
    rl_sensors:'rl_input_sensors', rl_lights:'rl_output_lights'
  };
  const key = keyMap[group];
  if (checked) {
    if (!_cfg[key].includes(eid)) _cfg[key] = [..._cfg[key], eid];
  } else {
    _cfg[key] = _cfg[key].filter(e => e !== eid);
  }
  // update badge counts
  const badgeMap = {
    lights:'cl-lights', lux:'cl-lux', motion:'cl-motion',
    rl_sensors:'rl-cl-sensors', rl_lights:'rl-cl-lights'
  };
  const totalMap = {
    lights:_entities?.counts?.lights, lux:_entities?.counts?.lux, motion:_entities?.counts?.motion,
    rl_sensors:_entities?.counts?.lux, rl_lights:_entities?.counts?.lights
  };
  const card = document.getElementById(badgeMap[group])?.closest('.settings-card');
  if (card) {
    const badge = card.querySelector('.badge');
    if (badge) badge.textContent = `${_cfg[key].length} / ${totalMap[group]??0}`;
  }
}

async function saveSettings() {

}

            </div>
          </div>
        </div>

        <div style="margin-top:18px">
          <div style="font-size:.82rem;font-weight:600;margin-bottom:10px;color:var(--text-dim)">⏱ Prodleva mezi akcemi</div>
          <div class="lux-control">
            <div class="lux-value-row">
              <input type="number" class="lux-number" style="width:90px" id="rl-cooldown"
                min="1" max="60" step="1"
                value="${c.rl_action_cooldown ?? 3}"
                oninput="cfgSet('rl_action_cooldown',+this.value)">
              <span class="lux-unit">sekund</span>
            </div>
            <input type="range" min="1" max="30" step="1" value="${Math.min(c.rl_action_cooldown??3, 30)}"
              oninput="cfgSet('rl_action_cooldown',+this.value);document.getElementById('rl-cooldown').value=this.value">
            <div class="lux-hint">Minimální čas mezi dvěma RL akcemi. Nižší = rychlejší reakce. Doporučeno: 3–5 s.</div>
          </div>
        </div>
      </div>

      <!-- ── Stav tréninku ── -->
      <div class="settings-card">
        <div class="settings-card-title">📈 Stav tréninku</div>
        ${rlStatsHtml(rl)}
        <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-danger" style="flex:1;justify-content:center" onclick="resetRLModel()">
            🗑 Resetovat model
          </button>
          <button class="btn" style="flex:1;justify-content:center" onclick="refreshRLStats()">
            ↻ Obnovit stav
          </button>
        </div>
        <div style="margin-top:10px;font-size:.7rem;color:var(--text-muted)">
          ε = míra průzkumu (klesá s tréninkem). Model se ukládá automaticky každých 50 kroků do <code>/data/rl_model.json</code>.
        </div>
      </div>

      <!-- ── Vstupní lux senzory ── -->
      <div class="settings-card">
        <div class="settings-card-title">🔆 Vstupní lux senzory
          <span class="badge">${c.rl_input_sensors.length} / ${ents?.counts?.lux??0}</span>
        </div>
        <div class="lux-hint" style="margin-bottom:10px">
          Senzory, jejichž hodnoty RL agent sleduje jako vstup (stav prostředí).
        </div>
        <div class="checklist" id="rl-cl-sensors">
          ${renderChecklist(ents?.lux_sensors??[], c.rl_input_sensors, 'rl_sensors',
            s=>`${s.state} ${s.unit}`)}
        </div>
      </div>

      <!-- ── Výstupní světla ── -->
      <div class="settings-card">
        <div class="settings-card-title">💡 Výstupní světla
          <span class="badge">${c.rl_output_lights.length} / ${ents?.counts?.lights??0}</span>
        </div>
        <div class="lux-hint" style="margin-bottom:10px">
          Světla, jejichž jas RL agent ovládá. Musí podporovat regulaci jasu (dim).
        </div>
        <div class="checklist" id="rl-cl-lights">
          ${renderChecklist(ents?.lights??[], c.rl_output_lights, 'rl_lights')}
        </div>
      </div>

    </div><!-- /settings-grid -->

    <div class="save-bar">
      <span class="save-hint" id="rl-save-hint">Nastavení se uloží a okamžitě aplikují.</span>
      <button class="btn btn-primary" onclick="saveRL()">💾 Uložit nastavení</button>
    </div>`;
}

async function saveRL() {
  const hint = document.getElementById('rl-save-hint');
  hint.textContent = '⏳ Ukládám…';
  const targetChanged = _cfg.rl_target_lux !== _savedCfg.rl_target_lux;
  try {
    const r = await fetch('api/config', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(_cfg)
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    _savedCfg = JSON.parse(JSON.stringify(_cfg));
    hint.textContent = 'Nastavení se uloží a okamžitě aplikují.';
    showToast(targetChanged ? '✔ Cíl změněn — replay buffer vymazán' : '✔ RL nastavení uloženo');
    await refreshRLStats();
  } catch(e) {
    hint.textContent = 'Chyba při ukládání.';
    showToast('Chyba: ' + e.message, true);
  }
}

async function refreshRLStats() {
  try {
    const r = await fetch('api/rl/status');
    if (!r.ok) return;
    _rlStatus = await r.json();
    if (document.getElementById('tab-rl')?.classList.contains('active')) {
      renderRL();
    }
  } catch(e) { /* ignore */ }
}

async function resetRLModel() {
  if (!confirm('Opravdu smazat naučený model? Tato akce je nevratná.')) return;
  try {
    const r = await fetch('api/rl/reset', {method:'POST'});
    if (r.ok) {
      showToast('✔ Model byl resetován');
      await refreshRLStats();
    } else {
      showToast('Chyba při resetování', true);
    }
  } catch(e) {
    showToast('Chyba: ' + e.message, true);
  }
}

/* ═══════════════════════════════════════════
   AUTO-REFRESH (overview only)
═══════════════════════════════════════════ */
let cd = 30, rlCd = 10;
function tick() {
  cd--;
  rlCd--;
  document.getElementById('countdown').textContent = `Auto-refresh: ${cd}s`;
  if (cd <= 0)  { cd = 30;  refreshOverview(); }
  if (rlCd <= 0){ rlCd = 10; refreshRLStats(); }
}
refreshOverview();
setInterval(tick, 1000);
</script>
</body>
</html>
